  // ─── EASING ─────────────────────────────────────────────────────────────────
  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1 + (4-2*t)*t; }

  // ─── GLOBALS ────────────────────────────────────────────────────────────────
  let blocks = [];
  let path2dShadow, path2dRed;

  function getScale() {
    return (width * 0.82) / (DESIGN_X2 - DESIGN_X1);
  }

  function toX(sx, sc) { return width/2  + (sx - DESIGN_CX) * sc; }
  function toY(sy, sc) { return height/2 + (sy - DESIGN_CY) * sc; }

  // ─── SETUP ──────────────────────────────────────────────────────────────────
  function setup() {
    let cnv = createCanvas(windowWidth, windowHeight);
    cnv.style('position', 'fixed');
    cnv.style('top', '0');
    cnv.style('left', '0');
    cnv.style('z-index', '-1');

    path2dShadow = new Path2D(PATH_SHADOW);
    path2dRed    = new Path2D(PATH_RED);

    for (let i = 0; i < BLOCK_RECTS.length; i++) {
      let b = BLOCK_RECTS[i];
      let seed  = (i * 1.618033 + 0.5) % 1;
      let seed2 = (i * 0.7071   + 0.3) % 1;
      let scatterX = (seed  - 0.5) * 1200;
      let scatterY = (seed2 - 0.5) *  300;
      blocks.push({ ...b, scatterX, scatterY });
    }
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }

  // ─── DRAW LAYER ─────────────────────────────────────────────────────────────
  function drawLayer(path2d, fillColor, layerOffX, layerOffY, sc, t) {
    let ctx = drawingContext;
    for (let b of blocks) {
      let dispX = b.scatterX * t * sc;
      let dispY = b.scatterY * t * sc;

      let bx = toX(b.x + layerOffX, sc) + dispX;
      let by = toY(b.y + layerOffY, sc) + dispY;
      let bw = b.w * sc;
      let bh = b.h * sc;

      ctx.save();
      ctx.beginPath();
      ctx.rect(bx, by, bw, bh);
      ctx.clip();

      let ox = width/2  - DESIGN_CX * sc + layerOffX * sc + dispX;
      let oy = height/2 - DESIGN_CY * sc + layerOffY * sc + dispY;
      ctx.translate(ox, oy);
      ctx.scale(sc, sc);
      ctx.fillStyle = fillColor;
      ctx.fill(path2d);
      ctx.restore();
    }
  }

  // ─── DRAW ───────────────────────────────────────────────────────────────────
  function draw() {
    background(0);

    let sc = getScale();
    let mx = constrain(mouseX / width, 0, 1);
    let t  = easeInOut(mx);

    drawLayer(path2dShadow, '#180C31', 35, 35, sc, t);
    drawLayer(path2dRed,    '#ED0010',  0,  0, sc, t);
  }
